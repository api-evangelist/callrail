created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: callrail:v3-api
    name: CallRail v3 API
    description: >-
      REST API providing programmatic access to CallRail accounts,
      companies, tracking numbers, calls, text messages, form
      submissions, users, tags, and integrations. Requests authenticate
      via the HTTP header Authorization Token token="YOUR_API_KEY".
    humanURL: https://apidocs.callrail.com/
    baseURL: https://api.callrail.com/v3/
    tags:
